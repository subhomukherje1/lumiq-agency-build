    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revium Labs — B2B Analytics, CRO & AI-Powered Revenue Growth</title>
    <meta name="description" content="Revium Labs helps B2B SaaS companies fix broken tracking, run AI-assisted A/B tests, and build the revenue engine that turns ad spend into provable pipeline.">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://logo.clearbit.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://calendly.com" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Google Analytics (GA4) -->
    <!-- ACTION REQUIRED: Replace GA4_MEASUREMENT_ID with your actual GA4 Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA4_MEASUREMENT_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'GA4_MEASUREMENT_ID');
    </script>
    
    <!-- Default Open Graph (overridden by react-helmet-async per page) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Revium Labs" />
    <meta property="og:title" content="Revium Labs — B2B Analytics, CRO & AI-Powered Revenue Growth">

    <meta property="og:image" content="https://reviumlabs.co/og-image.jpg">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@reviumlabs">
    <meta name="twitter:title" content="Revium Labs — B2B Analytics, CRO & AI-Powered Revenue Growth">
    <meta name="twitter:description" content="Revium Labs helps B2B SaaS companies fix broken tracking, run AI-assisted A/B tests, and build the revenue engine that turns ad spend into provable pipeline.">
    <meta name="twitter:image" content="https://reviumlabs.co/og-image.jpg">
